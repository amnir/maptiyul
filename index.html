<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>MapTiyul · מפת אתרים ואטרקציות בישראל</title>
  <meta name="description" content="מפה אינטראקטיבית של אלפי אתרים, אטרקציות, פארקים ועגלות קפה בישראל — סינון לפי סוג, אזור ומקור." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Share preview (WhatsApp / Facebook / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="MapTiyul · מפת אתרים ואטרקציות בישראל" />
  <meta property="og:description" content="אלפי אתרים, אטרקציות, פארקים ועגלות קפה בישראל על מפה אחת. סינון לפי סוג, אזור ומקור." />
  <meta property="og:url" content="https://amnir.github.io/maptiyul/" />
  <meta property="og:image" content="https://amnir.github.io/maptiyul/og-image.png" />
  <meta property="og:locale" content="he_IL" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#1f7a8c" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <!-- PWA / add-to-home-screen -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MapTiyul" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@300..800&display=swap" />

  <style>
    :root {
      --bg: #0f1720;
      --panel: #ffffff;
      --ink: #15212e;
      --muted: #5b6b7b;
      --line: rgba(20,40,60,.10);
      --accent: #1f7a8c;
      --r-north: #2e9e5b;
      --r-center: #2f6fd0;
      --r-jlem: #8b5cf6;
      --r-south: #e08a1e;
      --shadow: 0 10px 40px rgba(15,40,60,.18);
      --glass: rgba(255,255,255,.60);
      --glass-strong: rgba(255,255,255,.80);
      --glass-border: rgba(255,255,255,.55);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Assistant", "Heebo", "Segoe UI", system-ui, Arial, sans-serif;
      color: var(--ink); background: #eef2f5;
    }
    #app { position: relative; height: 100vh; height: 100dvh; overflow: hidden; }

    /* Sidebar — floating frosted-glass panel */
    #sidebar {
      position: absolute; top: 14px; right: 14px; z-index: 1000;
      width: 358px; max-height: calc(100dvh - 28px);
      background: var(--glass);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid var(--glass-border);
      border-radius: 20px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .side-head { padding: 18px 18px 12px; border-bottom: 1px solid var(--line); }
    .side-head h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -.02em; direction: ltr; text-align: right; }
    .side-head .tagline { margin-top: 2px; font-size: 14px; font-weight: 600; color: var(--ink); }
    .side-head .count { margin-top: 4px; font-size: 13px; color: var(--muted); }
    .side-body { padding: 14px 18px; overflow-y: auto; flex: 1; }

    .search {
      width: 100%; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 10px; font-size: 14px; font-family: inherit; outline: none;
      background: var(--glass-strong);
    }
    .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,122,140,.12); }
    .typesearch { margin-top: 8px; font-size: 13px; padding: 8px 11px; }

    .resetall { width: 100%; margin-top: 10px; padding: 9px; border: 1px solid var(--line);
      background: #fff; border-radius: 10px; font-family: inherit; font-size: 13px; cursor: pointer; color: var(--muted); }
    .resetall:hover { background: #f4f7f9; }

    .type-row.hide { display: none; }

    .group { margin-top: 18px; }
    .group h2 {
      font-size: 12px; text-transform: none; letter-spacing: .02em;
      color: var(--muted); margin: 0 0 8px; font-weight: 700;
    }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      border: 1px solid var(--line); background: var(--glass-strong); color: var(--ink);
      border-radius: 999px; padding: 6px 12px; font-size: 13px; cursor: pointer;
      user-select: none; transition: .12s; display: inline-flex; align-items: center; gap: 6px;
    }
    .pill:hover { border-color: #c9d3db; }
    .pill .dot { width: 9px; height: 9px; border-radius: 50%; }
    .pill.active { color: #fff; border-color: transparent; }
    .pill.r-north.active { background: var(--r-north); }
    .pill.r-center.active { background: var(--r-center); }
    .pill.r-jlem.active { background: var(--r-jlem); }
    .pill.r-south.active { background: var(--r-south); }
    .pill.src.active { background: var(--accent); border-color: transparent; }

    .types { display: flex; flex-direction: column; gap: 2px; }
    .type-row {
      display: flex; align-items: center; gap: 9px; padding: 7px 6px;
      border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .type-row:hover { background: rgba(255,255,255,.55); }
    .type-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .type-row .c { color: var(--muted); font-size: 12px; margin-inline-start: auto; }

    .row-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn {
      flex: 1; padding: 8px; border-radius: 9px; border: 1px solid var(--line);
      background: var(--glass-strong); cursor: pointer; font-size: 13px; font-family: inherit;
    }
    .btn:hover { background: #fff; }
    .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }

    .quickbar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .qbtn { flex: 1 1 auto; display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 9px; border: 1px solid var(--line); background: var(--glass-strong); border-radius: 10px;
      font-size: 13px; font-family: inherit; cursor: pointer; transition: .12s;
      white-space: nowrap; min-width: 96px; }
    .qbtn:hover { background: #fff; }
    .qbtn.active { background: var(--accent); color: #fff; border-color: transparent; }
    .radiuswrap { display: none; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; color: var(--muted); }
    .radiuswrap.show { display: flex; }
    .radiuswrap select { flex: 1; padding: 7px; border: 1px solid var(--line); border-radius: 9px;
      font-family: inherit; font-size: 13px; background: var(--glass-strong); }
    .user-dot { position: relative; width: 16px; height: 16px; border-radius: 50%;
      background: #2f6fd0; border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
    .user-dot::before { content: ""; position: absolute; inset: -3px; z-index: -1;
      border-radius: 50%; background: rgba(47,111,208,.45);
      animation: user-pulse 2s ease-out infinite; }
    @keyframes user-pulse {
      0%   { transform: scale(1);   opacity: .6; }
      100% { transform: scale(3.4); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .user-dot::before { animation: none; transform: scale(2); opacity: .35; }
    }

    .listtoggle { width: 100%; margin-top: 8px; padding: 9px; border: 1px solid var(--line);
      background: var(--glass-strong); border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
    .listtoggle:hover { background: #fff; }
    .listtoggle.active { background: var(--accent); color: #fff; border-color: transparent; }
    .results { display: none; margin-top: 8px; max-height: 320px; overflow-y: auto;
      border: 1px solid var(--line); border-radius: 10px; background: var(--glass-strong); }
    .results.show { display: block; }
    .result-row { display: flex; align-items: center; gap: 8px; padding: 9px 11px;
      border-bottom: 1px solid var(--line); cursor: pointer; }
    .result-row:last-child { border-bottom: none; }
    .result-row:hover { background: rgba(255,255,255,.6); }
    .result-row .rt { font-weight: 600; font-size: 13px; flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .result-row .rm { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .results .more { padding: 9px 11px; color: var(--muted); font-size: 12px; text-align: center; }
    .results .empty { padding: 14px; color: var(--muted); font-size: 13px; text-align: center; }

    /* Map */
    #map { position: absolute; inset: 0; z-index: 0; }
    .leaflet-popup-content { margin: 0; width: 244px !important; }
    .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: 0 12px 36px rgba(15,40,60,.22); padding: 0; overflow: hidden; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #fff; }
    .pop-img { width: 100%; height: 132px; object-fit: cover; display: block; background: #dde4ea; }
    .pop-body { padding: 12px 14px 14px; direction: rtl; text-align: right; }
    .pop-title { font-weight: 800; font-size: 16px; margin: 0 0 7px; line-height: 1.3;
      letter-spacing: -.01em; color: var(--ink); direction: rtl; text-align: right; }
    .pop-addr { font-size: 12px; color: var(--muted); margin: 0 0 6px; display: flex; gap: 5px; align-items: flex-start; }
    .pop-addr svg, .pop-dist svg { flex-shrink: 0; margin-top: 1px; }
    .pop-desc { font-size: 12px; color: #44535e; margin: 0 0 6px; line-height: 1.45;
      max-height: 88px; overflow: hidden; }
    .pop-meta { font-size: 12px; color: var(--muted); margin: 0 0 4px; }
    .pop-meta a { color: var(--accent); text-decoration: none; }
    .pop-tag.acc { background: #e3f2e8; color: #1d6b3a; font-weight: 700; }
    .pop-weather { font-size: 12px; color: #44535e; margin: 0 0 6px; min-height: 15px; }
    .pop-dist { font-size: 12.5px; font-weight: 700; color: var(--accent); margin: 0 0 8px; display: flex; gap: 5px; align-items: center; }
    .fav-btn { width: 100%; margin: 0 0 8px; padding: 9px; border: 1px solid var(--line);
      background: #fff; border-radius: 11px; font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; color: var(--ink); transition: background .12s, border-color .12s, color .12s; }
    .fav-btn:hover { background: #fff7e6; border-color: #f0d9a0; }
    .fav-btn.on { background: #fff2cc; border-color: #f0c14b; color: #8a6d1a; }
    .pop-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 11px; }
    .pop-tag { font-size: 11px; background: #eef3f5; color: #34566a; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
    .oh { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 7px; }
    .oh-badge, .oh-sat { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
      display: inline-flex; align-items: center; gap: 4px; }
    .oh-badge.open, .oh-sat.open { background: #e3f2e8; color: #1d6b3a; }
    .oh-badge.closed, .oh-sat.closed { background: #fce8e8; color: #b3261e; }
    .oh-na { color: var(--muted); font-style: italic; }
    .pop-links { display: flex; flex-wrap: wrap; gap: 4px 14px; margin-top: 2px; }
    .pop-link { display: inline-block; font-size: 13px; font-weight: 700; color: var(--accent); text-decoration: none; }
    .pop-link:hover { text-decoration: underline; }
    .pop-nav { display: flex; gap: 8px; margin: 2px 0 11px; }
    .nav-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 12.5px; font-weight: 700; white-space: nowrap; text-decoration: none; padding: 10px 6px; border-radius: 12px;
      background: #fff; border: 1px solid var(--line); box-shadow: 0 1px 2px rgba(15,40,60,.07);
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease; }
    .nav-btn svg { flex-shrink: 0; }
    .nav-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(15,40,60,.15); }
    .nav-btn:active { transform: translateY(0); box-shadow: 0 1px 2px rgba(15,40,60,.07); }
    .nav-btn.waze { color: #0a9ec2; }
    .nav-btn.waze:hover { border-color: #9fe3f3; }
    .nav-btn.gmaps { color: #3c4043; }
    .nav-btn.gmaps:hover { border-color: #c9d6e4; }

    .marker-pin {
      display: block;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.4));
    }

    /* Mobile */
    #toggle { display: none; }
    @media (max-width: 720px) {
      #sidebar {
        top: 10px; right: 10px; left: 10px; width: auto;
        max-height: calc(100dvh - 20px);
        transform: translateY(calc(-100% - 14px)); transition: transform .25s;
      }
      #sidebar.open { transform: translateY(0); }
      .side-head { padding-inline-start: 104px; }
      #toggle {
        display: flex; position: absolute; top: 14px; right: 14px; z-index: 1100;
        align-items: center; gap: 6px;
        background: var(--glass-strong);
        -webkit-backdrop-filter: blur(18px) saturate(150%);
        backdrop-filter: blur(18px) saturate(150%);
        color: var(--accent); font-weight: 700;
        border: 1px solid var(--glass-border); border-radius: 12px;
        padding: 10px 14px; font-size: 14px; font-family: inherit; box-shadow: var(--shadow); cursor: pointer;
      }
    }
    /* ===== AI Trip Planner (beta) ===== */
    .fab-plan {
      position: absolute; left: 50%; transform: translateX(-50%); bottom: 22px; z-index: 1200;
      display: inline-flex; align-items: center; gap: 9px; padding: 13px 22px;
      border: none; border-radius: 999px; cursor: pointer; font-family: inherit;
      font-size: 15px; font-weight: 800; color: #fff;
      background: linear-gradient(135deg, #7c3aed, #1f7a8c);
      box-shadow: 0 8px 26px rgba(76,29,149,.42); transition: transform .15s, box-shadow .15s;
    }
    .fab-plan:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 12px 32px rgba(76,29,149,.5); }
    .fab-plan .spark { font-size: 17px; }
    .fab-plan .sim { font-size: 10px; font-weight: 700; background: rgba(255,255,255,.25); padding: 2px 7px; border-radius: 999px; }

    .trip-backdrop {
      position: absolute; inset: 0; z-index: 1300; background: rgba(15,25,35,.45);
      -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center; padding: 14px;
    }
    .trip-backdrop.show { display: flex; }
    .trip-sheet {
      width: min(440px, 100%); background: var(--panel); border-radius: 22px;
      box-shadow: var(--shadow); padding: 20px; direction: rtl; text-align: right;
    }
    .trip-sheet h2 { margin: 0 0 3px; font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
    .trip-sheet .sub { margin: 0 0 14px; font-size: 13px; color: var(--muted); line-height: 1.45; }
    .trip-input {
      width: 100%; min-height: 76px; resize: none; padding: 12px 14px; border: 1px solid var(--line);
      border-radius: 14px; font-family: inherit; font-size: 15px; outline: none; background: #f7fafb; line-height: 1.5;
    }
    .trip-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,122,140,.12); }
    .trip-chips { display: flex; flex-wrap: wrap; gap: 7px; margin: 12px 0 16px; }
    .trip-chip {
      border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 7px 13px;
      font-size: 13px; font-family: inherit; cursor: pointer; transition: .12s;
    }
    .trip-chip:hover { border-color: #c9d3db; }
    .trip-chip.on { background: #f3eaff; border-color: #c9aef5; color: #5b21b6; font-weight: 700; }
    .trip-go {
      width: 100%; padding: 13px; border: none; border-radius: 14px; cursor: pointer;
      font-family: inherit; font-size: 15px; font-weight: 800; color: #fff;
      background: linear-gradient(135deg, #7c3aed, #1f7a8c);
    }
    .trip-cancel { width: 100%; margin-top: 8px; padding: 10px; border: none; background: none;
      color: var(--muted); font-family: inherit; font-size: 13px; cursor: pointer; }

    .trip-think { display: flex; align-items: center; gap: 12px; padding: 10px 2px; font-size: 14px; color: var(--ink); }
    .trip-spin {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      border: 3px solid rgba(124,58,237,.25); border-top-color: #7c3aed; animation: trip-rot .7s linear infinite;
    }
    @keyframes trip-rot { to { transform: rotate(360deg); } }

    .trip-panel {
      position: absolute; top: 14px; left: 14px; z-index: 1100; width: 340px;
      max-height: calc(100dvh - 28px); background: var(--glass);
      -webkit-backdrop-filter: blur(20px) saturate(150%); backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: var(--shadow);
      display: none; flex-direction: column; overflow: hidden; direction: rtl; text-align: right;
    }
    .trip-panel.show { display: flex; }
    .trip-phead {
      position: relative; padding: 16px 18px 12px; border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(124,58,237,.10), rgba(31,122,140,.10));
    }
    .trip-phead .ttl { font-size: 18px; font-weight: 800; letter-spacing: -.02em; margin: 0; }
    .trip-phead .meta { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
    .trip-phead .close {
      position: absolute; top: 12px; left: 12px; border: none; background: rgba(255,255,255,.7);
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; color: var(--muted);
    }
    .trip-intro {
      font-size: 13px; color: #44535e; line-height: 1.5; padding: 12px 18px;
      border-bottom: 1px solid var(--line); display: flex; gap: 8px;
    }
    .trip-intro .ai { flex-shrink: 0; font-size: 15px; }
    .trip-body { padding: 6px 14px 12px; overflow-y: auto; flex: 1; }

    .tstop { display: flex; gap: 11px; padding: 8px 6px 0; cursor: pointer; border-radius: 12px; }
    .tstop:hover { background: rgba(255,255,255,.55); }
    .tstop .num {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; color: #fff; font-weight: 800; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #7c3aed, #1f7a8c); box-shadow: 0 2px 6px rgba(76,29,149,.35);
    }
    .tstop .body { flex: 1; padding-bottom: 4px; }
    .tstop .row1 { display: flex; align-items: baseline; gap: 7px; }
    .tstop .time { font-weight: 800; font-size: 14px; color: var(--accent); }
    .tstop .kind { font-size: 11px; background: #eef3f5; color: #34566a; padding: 2px 8px; border-radius: 999px; font-weight: 700; }
    .tstop .name { font-weight: 800; font-size: 15px; margin: 3px 0 2px; line-height: 1.3; }
    .tstop .why { font-size: 12.5px; color: #55656f; line-height: 1.45; }
    .tstop .dur { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
    .tleg { display: flex; align-items: center; gap: 8px; margin: 4px 0; color: var(--muted); font-size: 12px; }
    .tleg .line {
      width: 2px; height: 18px; margin-inline-start: 14px; flex-shrink: 0;
      background: repeating-linear-gradient(#b9c6d0, #b9c6d0 3px, transparent 3px, transparent 6px);
    }

    .trip-actions { padding: 12px 16px 16px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 8px; }
    .trip-actions .nav {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 12px;
      border-radius: 13px; font-family: inherit; font-size: 14px; font-weight: 800; text-decoration: none;
      cursor: pointer; border: none; background: linear-gradient(135deg, #7c3aed, #1f7a8c); color: #fff;
    }
    .trip-actions .redo { background: #fff; color: var(--ink); border: 1px solid var(--line); }

    .route-num {
      width: 30px; height: 30px; border-radius: 50% 50% 50% 2px; transform: rotate(45deg);
      background: linear-gradient(135deg, #7c3aed, #1f7a8c); border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center;
      transition: transform .35s cubic-bezier(.2,1.5,.4,1), opacity .25s ease;
    }
    .route-num.is-pre { transform: rotate(45deg) scale(0); opacity: 0; }
    .route-num span { transform: rotate(-45deg); color: #fff; font-weight: 800; font-size: 13px; }
    @media (prefers-reduced-motion: reduce) { .route-num { transition: none; } }

    @media (max-width: 720px) {
      .trip-panel { top: auto; bottom: 0; left: 0; right: 0; width: auto; max-height: 72dvh; border-radius: 20px 20px 0 0; }
      .fab-plan { bottom: 16px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <button id="toggle">סינון ☰</button>
    <aside id="sidebar">
      <div class="side-head">
        <h1>📍 MapTiyul</h1>
        <div class="tagline">אתרים ואטרקציות בישראל</div>
        <div class="count"><span id="count">—</span> מקומות על המפה</div>
      </div>
      <div class="side-body">
        <input id="search" class="search" type="search" placeholder="חיפוש לפי שם או מילת מפתח…" />

        <div class="quickbar">
          <button id="locate" class="qbtn">📍 קרוב אליי</button>
          <button id="favToggle" class="qbtn"><span>☆ מועדפים (<span id="favCount">0</span>)</span></button>
          <button id="accToggle" class="qbtn">♿ נגישים</button>
          <button id="nowToggle" class="qbtn" title="מסתיר רק מקומות שידוע שסגורים עכשיו">🟢 פתוח עכשיו</button>
          <button id="satToggle" class="qbtn" title="מסתיר רק מקומות שידוע שסגורים בשבת">🗓️ פתוח בשבת</button>
          <button id="share" class="qbtn">🔗 שיתוף</button>
        </div>
        <div id="radiusWrap" class="radiuswrap">
          <span>מרחק:</span>
          <select id="radius">
            <option value="0">ללא הגבלה</option>
            <option value="10">עד 10 ק״מ</option>
            <option value="25">עד 25 ק״מ</option>
            <option value="50">עד 50 ק״מ</option>
            <option value="100">עד 100 ק״מ</option>
          </select>
        </div>

        <button id="listToggle" class="listtoggle">📋 הצג רשימת תוצאות</button>
        <div id="resultsList" class="results"></div>

        <button id="resetAll" class="resetall">↺ אפס את כל הסינונים</button>

        <div class="group">
          <h2>אזור</h2>
          <div class="pills" id="regions"></div>
        </div>

        <div class="group" id="sourceGroup">
          <h2>מקור</h2>
          <div class="pills" id="sources"></div>
        </div>

        <div class="group">
          <h2>סוג אטרקציה</h2>
          <div class="row-actions">
            <button class="btn" id="allTypes">הכל</button>
            <button class="btn" id="noTypes">נקה</button>
          </div>
          <input id="typeSearch" class="search typesearch" type="search" placeholder="סינון רשימת הסוגים…" />
          <div class="types" id="types" style="margin-top:8px"></div>
        </div>
      </div>
    </aside>

    <!-- AI Trip Planner (beta) -->
    <button id="fabPlan" class="fab-plan">
      <span class="spark">✨</span> תכנן לי טיול
      <span class="sim">בטא</span>
    </button>
    <div id="tripBackdrop" class="trip-backdrop">
      <div class="trip-sheet" id="tripSheet"></div>
    </div>
    <aside id="tripPanel" class="trip-panel"></aside>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="data/attractions.js"></script>
  <script>
    const REGION_META = {
      "צפון":   { cls: "r-north",  color: "#2e9e5b" },
      "מרכז":   { cls: "r-center", color: "#2f6fd0" },
      "ירושלים":{ cls: "r-jlem",   color: "#8b5cf6" },
      "דרום":   { cls: "r-south",  color: "#e08a1e" },
    };
    const DEFAULT_REGION = { cls: "r-center", color: "#64748b" };

    const data = (window.ATTRACTIONS || []).filter(a => a.lat && a.lng);
    data.forEach((a, i) => {
      a._i = i;
      a.id = (a.sources && a.sources[0] && a.sources[0].url) || `${a.title}|${a.lat}|${a.lng}`;
    });

    // ---- Favorites (persisted in the browser) ----
    const FAV_KEY = "maptiyul_favs";
    let favorites = new Set();
    try { favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]")); } catch (e) {}
    function saveFavs() { try { localStorage.setItem(FAV_KEY, JSON.stringify([...favorites])); } catch (e) {} }
    function updateFavCount() { document.getElementById("favCount").textContent = favorites.size; }
    function toggleFav(i, btn) {
      const a = data[i];
      if (!a) return;
      if (favorites.has(a.id)) favorites.delete(a.id); else favorites.add(a.id);
      saveFavs();
      updateFavCount();
      if (btn) {
        const on = favorites.has(a.id);
        btn.classList.toggle("on", on);
        btn.textContent = on ? "★ שמור במועדפים" : "☆ הוסף למועדפים";
      }
      if (state.favOnly) render();
    }

    const map = L.map("map", { zoomControl: true }).setView([31.4, 35.0], 8);
    const baseLayers = {
      "מפה": L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19, attribution: "&copy; OpenStreetMap"
      }),
      "לוויין": L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
        maxZoom: 19, attribution: "&copy; Esri, Maxar, Earthstar Geographics"
      }),
      "טופוגרפי": L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
        maxZoom: 17, attribution: "&copy; OpenTopoMap (CC-BY-SA), &copy; OpenStreetMap"
      }),
    };
    baseLayers["מפה"].addTo(map);
    L.control.layers(baseLayers, null, { position: "topleft" }).addTo(map);

    const cluster = L.markerClusterGroup({ maxClusterRadius: 50, spiderfyOnMaxZoom: true });
    map.addLayer(cluster);

    // ---- Build filter state ----
    const typeCounts = {};
    data.forEach(a => (a.types || []).forEach(t => typeCounts[t] = (typeCounts[t] || 0) + 1));
    const allTypes = Object.keys(typeCounts).sort((a, b) => typeCounts[b] - typeCounts[a]);
    const regionsPresent = [...new Set(data.map(a => a.region))].filter(Boolean);
    const REGION_ORDER = ["צפון", "מרכז", "ירושלים", "דרום"];
    const regions = REGION_ORDER.filter(r => regionsPresent.includes(r))
      .concat(regionsPresent.filter(r => !REGION_ORDER.includes(r)));

    const sourceLabels = {};
    const sourceCounts = {};
    data.forEach(a => (a.sources || []).forEach(s => {
      sourceLabels[s.name] = s.label || s.name;
      sourceCounts[s.name] = (sourceCounts[s.name] || 0) + 1;
    }));
    const sources = Object.keys(sourceLabels).sort((a, b) => sourceCounts[b] - sourceCounts[a]);

    const state = {
      regions: new Set(regions),
      types: new Set(allTypes),
      sources: new Set(sources),
      q: "",
      radiusKm: 0,
      favOnly: false,
      accOnly: false,
      openNow: false,
      openSat: false,
      listOpen: false,
    };
    let NOW = new Date();

    // ---- Location / distance ----
    let userLatLng = null;
    let userMarker = null;
    function distanceKm(a) {
      if (!userLatLng) return null;
      const R = 6371, toRad = d => d * Math.PI / 180;
      const dLat = toRad(a.lat - userLatLng.lat), dLng = toRad(a.lng - userLatLng.lng);
      const s = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(userLatLng.lat)) * Math.cos(toRad(a.lat)) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(s));
    }
    function setUserLocation(lat, lng) {
      userLatLng = { lat, lng };
      if (userMarker) userMarker.setLatLng([lat, lng]);
      else userMarker = L.marker([lat, lng], {
        icon: L.divIcon({ className: "", html: '<div class="user-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
        zIndexOffset: 1000, interactive: false,
      }).addTo(map);
      document.getElementById("radiusWrap").classList.add("show");
      document.getElementById("locate").classList.add("active");
      map.setView([lat, lng], 11);
      render();
    }

    // ---- Render filters ----
    const regionPills = {};
    const regionsEl = document.getElementById("regions");
    regions.forEach(r => {
      const meta = REGION_META[r] || DEFAULT_REGION;
      const el = document.createElement("button");
      el.className = `pill ${meta.cls} active`;
      el.innerHTML = `<span class="dot" style="background:${meta.color}"></span>${r}`;
      el.onclick = () => {
        if (state.regions.has(r)) { state.regions.delete(r); el.classList.remove("active"); }
        else { state.regions.add(r); el.classList.add("active"); }
        render();
      };
      regionPills[r] = el;
      regionsEl.appendChild(el);
    });

    const sourcePills = {};
    const sourcesEl = document.getElementById("sources");
    sources.forEach(name => {
      const el = document.createElement("button");
      el.className = "pill src active";
      el.textContent = `${sourceLabels[name]} (${sourceCounts[name]})`;
      el.onclick = () => {
        if (state.sources.has(name)) { state.sources.delete(name); el.classList.remove("active"); }
        else { state.sources.add(name); el.classList.add("active"); }
        render();
      };
      sourcePills[name] = el;
      sourcesEl.appendChild(el);
    });
    if (sources.length < 2) document.getElementById("sourceGroup").style.display = "none";

    const typesEl = document.getElementById("types");
    const typeInputs = {};
    const typeRows = {};
    allTypes.forEach(t => {
      const row = document.createElement("label");
      row.className = "type-row";
      row.innerHTML = `<input type="checkbox" checked /><span>${t}</span><span class="c">${typeCounts[t]}</span>`;
      const cb = row.querySelector("input");
      typeInputs[t] = cb;
      typeRows[t] = row;
      cb.onchange = () => {
        if (cb.checked) state.types.add(t); else state.types.delete(t);
        render();
      };
      typesEl.appendChild(row);
    });

    // Narrow the (long) type list without touching which types are selected.
    document.getElementById("typeSearch").addEventListener("input", e => {
      const q = e.target.value.trim().toLowerCase();
      allTypes.forEach(t => typeRows[t].classList.toggle("hide", q && !t.toLowerCase().includes(q)));
    });

    document.getElementById("resetAll").onclick = () => {
      state.regions = new Set(regions);
      state.sources = new Set(sources);
      state.types = new Set(allTypes);
      state.q = "";
      state.radiusKm = 0;
      state.favOnly = false;
      document.getElementById("search").value = "";
      document.getElementById("typeSearch").value = "";
      allTypes.forEach(t => { typeInputs[t].checked = true; typeRows[t].classList.remove("hide"); });
      Object.values(regionPills).forEach(el => el.classList.add("active"));
      Object.values(sourcePills).forEach(el => el.classList.add("active"));
      document.getElementById("radius").value = "0";
      document.getElementById("favToggle").classList.remove("active");
      render();
    };

    document.getElementById("search").addEventListener("input", e => {
      state.q = e.target.value.trim().toLowerCase();
      render();
    });
    document.getElementById("allTypes").onclick = () => {
      state.types = new Set(allTypes);
      Object.values(typeInputs).forEach(cb => cb.checked = true);
      render();
    };
    document.getElementById("noTypes").onclick = () => {
      state.types = new Set();
      Object.values(typeInputs).forEach(cb => cb.checked = false);
      render();
    };
    document.getElementById("toggle").onclick = () =>
      document.getElementById("sidebar").classList.toggle("open");

    document.getElementById("locate").onclick = () => {
      if (!navigator.geolocation) { alert("הדפדפן לא תומך באיתור מיקום"); return; }
      if (!window.isSecureContext) {
        alert("איתור מיקום עובד רק בחיבור מאובטח (https). נסו לפתוח את האתר בכתובת https.");
        return;
      }
      const btn = document.getElementById("locate");
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = "מאתר…";
      const deniedMsg = "הגישה למיקום נחסמה. באייפון: הגדרות > פרטיות > שירותי מיקום > Safari, ולאפשר מיקום לאתר דרך תפריט aA בשורת הכתובת.";
      const done = () => { btn.disabled = false; btn.textContent = "📍 קרוב אליי"; };
      const onSuccess = pos => { done(); setUserLocation(pos.coords.latitude, pos.coords.longitude); };
      const onError = err => {
        if (err.code === err.PERMISSION_DENIED) { done(); alert(deniedMsg); return; }
        // High accuracy (GPS) often times out indoors — retry once with low accuracy
        navigator.geolocation.getCurrentPosition(onSuccess, err2 => {
          done();
          alert(err2.code === err2.PERMISSION_DENIED ? deniedMsg
            : "לא הצלחנו לאתר את המיקום שלך. ודאו ששירותי המיקום פעילים ונסו שוב.");
        }, { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 });
      };
      navigator.geolocation.getCurrentPosition(onSuccess, onError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
    };
    document.getElementById("radius").onchange = e => {
      state.radiusKm = Number(e.target.value);
      render();
    };
    document.getElementById("favToggle").onclick = () => {
      state.favOnly = !state.favOnly;
      document.getElementById("favToggle").classList.toggle("active", state.favOnly);
      render();
    };
    document.getElementById("accToggle").onclick = () => {
      state.accOnly = !state.accOnly;
      document.getElementById("accToggle").classList.toggle("active", state.accOnly);
      render();
    };
    document.getElementById("nowToggle").onclick = () => {
      state.openNow = !state.openNow;
      document.getElementById("nowToggle").classList.toggle("active", state.openNow);
      render();
    };
    document.getElementById("satToggle").onclick = () => {
      state.openSat = !state.openSat;
      document.getElementById("satToggle").classList.toggle("active", state.openSat);
      render();
    };
    document.getElementById("listToggle").onclick = () => {
      state.listOpen = !state.listOpen;
      const btn = document.getElementById("listToggle");
      btn.classList.toggle("active", state.listOpen);
      btn.textContent = state.listOpen ? "📋 הסתר רשימה" : "📋 הצג רשימת תוצאות";
      document.getElementById("resultsList").classList.toggle("show", state.listOpen);
      renderList();
    };

    function flyToPlace(a) {
      const m = markers[a._i];
      cluster.zoomToShowLayer(m, () => m.openPopup());
      if (window.matchMedia("(max-width: 720px)").matches)
        document.getElementById("sidebar").classList.remove("open");
    }
    function renderList() {
      const box = document.getElementById("resultsList");
      if (!state.listOpen) { box.innerHTML = ""; return; }
      let shown = markers.filter(m => matches(m._data)).map(m => m._data);
      shown.sort(userLatLng
        ? (a, b) => distanceKm(a) - distanceKm(b)
        : (a, b) => a.title.localeCompare(b.title, "he"));
      if (!shown.length) { box.innerHTML = '<div class="empty">אין תוצאות לסינון הנוכחי</div>'; return; }
      const CAP = 300;
      const rows = shown.slice(0, CAP).map(a => {
        const d = distanceKm(a);
        const meta = d != null
          ? (d < 1 ? Math.round(d * 1000) + " מ׳" : d.toFixed(1) + " ק״מ")
          : (a.types && a.types[0] ? a.types[0] : a.region || "");
        return `<div class="result-row" data-i="${a._i}">
          <span class="rt">${esc(a.title)}</span><span class="rm">${esc(meta)}</span></div>`;
      }).join("");
      const more = shown.length > CAP ? `<div class="more">ועוד ${shown.length - CAP} תוצאות…</div>` : "";
      box.innerHTML = rows + more;
      box.querySelectorAll(".result-row").forEach(el =>
        el.onclick = () => flyToPlace(data[Number(el.dataset.i)]));
    }

    // ---- Markers ----
    function markerIcon(region) {
      const color = (REGION_META[region] || DEFAULT_REGION).color;
      return L.divIcon({
        className: "",
        html: `<svg class="marker-pin" width="26" height="36" viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M13 0C5.82 0 0 5.82 0 13c0 9.75 13 23 13 23s13-13.25 13-23C26 5.82 20.18 0 13 0z" fill="${color}" stroke="#fff" stroke-width="2"/>
          <circle cx="13" cy="13" r="5" fill="#fff"/>
        </svg>`,
        iconSize: [26, 36], iconAnchor: [13, 36], popupAnchor: [0, -32],
      });
    }
    function esc(s) { return (s || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
    const PIN_SVG = '<svg width="12" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2C8.1 2 5 5.1 5 9c0 5 7 13 7 13s7-8 7-13c0-3.9-3.1-7-7-7z" fill="currentColor"/><circle cx="12" cy="9" r="2.5" fill="#fff"/></svg>';
    const WAZE_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3C7.2 3 3.3 6.2 3.3 10.3c0 1.6.6 3.1 1.7 4.3-.2 1-.7 1.9-1.4 2.6-.4.4-.1 1 .4 1 1.7 0 3.2-.6 4.2-1.5 1.2.4 2.5.5 3.8.5 4.8 0 8.7-3.2 8.7-7.4S16.8 3 12 3z" fill="#33ccff"/><circle cx="9.3" cy="10.1" r="1" fill="#fff"/><circle cx="13.9" cy="10.1" r="1" fill="#fff"/><path d="M8.9 12.6c.7 1 1.9 1.6 3.2 1.6s2.5-.6 3.2-1.6" stroke="#fff" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>';
    const GMAPS_SVG = '<svg width="16" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M16.5 3.4A7 7 0 0 0 5.6 5.2l4.2 3.6 6.7-5.4z" fill="#4285F4"/><path d="M5.6 5.2A7 7 0 0 0 5 9c0 1.6.6 3.1 1.4 4.6l3.4-4.8L5.6 5.2z" fill="#34A853"/><path d="M12 5.9A3.1 3.1 0 0 1 15.1 9c0 .8-.3 1.6-.8 2.2l4-5.2a7 7 0 0 0-1.8-2.6l-6.7 5.4A3.1 3.1 0 0 1 12 5.9z" fill="#FBBC04"/><path d="M12 22s1.8-2.3 3.6-5l-1.3-1.8c-.5.6-1.3 1-2.3 1A3.1 3.1 0 0 1 8.9 13l-2.5-3.4C6 9.5 6 9.8 6 9c0 1.6.6 3.1 1.4 4.6C9.6 17.3 12 22 12 22z" fill="#EA4335"/><circle cx="12" cy="9" r="2.6" fill="#fff"/></svg>';
    // ---- Opening hours engine ----
    // Parses the two formats present in the data: a subset of OSM `opening_hours`
    // (day ranges, time ranges, off, PH, summer/winter, 24/7, bare time ranges) and
    // the parks Hebrew seasonal form "קיץ HH:MM–HH:MM · חורף HH:MM–HH:MM" (open daily).
    // Day index follows JS getDay(): Su=0 … Sa=6.
    const DAY_IDX = { su: 0, mo: 1, tu: 2, we: 3, th: 4, fr: 5, sa: 6 };
    // Apr–Sep ≈ the parks "summer" season; good enough for seasonal closing times.
    function isSummer(d) { const m = d.getMonth() + 1; return m >= 4 && m <= 9; }
    function parseTime(t) {
      const m = /^(\d{1,2}):(\d{2})$/.exec((t || "").trim());
      return m ? (+m[1]) * 60 + (+m[2]) : null;
    }
    function fmtMin(m) {
      m = ((m % 1440) + 1440) % 1440;
      return String(Math.floor(m / 60)).padStart(2, "0") + ":" + String(m % 60).padStart(2, "0");
    }
    function parseRanges(spec) { // "off"/"closed" -> []; "HH:MM-HH:MM,HH:MM-HH:MM" -> [[s,e],...]
      spec = (spec || "").trim();
      if (!spec || /^(off|closed)$/i.test(spec)) return [];
      const out = [];
      spec.split(",").forEach(part => {
        const m = /^(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})$/.exec(part.trim());
        if (m) { const a = parseTime(m[1]), b = parseTime(m[2]); if (a != null && b != null) out.push([a, b]); }
      });
      return out;
    }
    function parseDays(spec) { // "Mo-Th, Sa, Su" / "Fr,Sa" -> [day idx]; PH/unknown ignored
      const days = [];
      spec.split(",").forEach(tok => {
        tok = tok.trim().toLowerCase();
        const rng = /^([a-z]{2})\s*-\s*([a-z]{2})$/.exec(tok);
        if (rng && DAY_IDX[rng[1]] != null && DAY_IDX[rng[2]] != null) {
          let k = DAY_IDX[rng[1]]; const end = DAY_IDX[rng[2]];
          for (let i = 0; i < 7; i++) { days.push(k); if (k === end) break; k = (k + 1) % 7; }
        } else if (DAY_IDX[tok] != null) days.push(DAY_IDX[tok]);
      });
      return days;
    }
    function parseHours(str) {
      const s = (str || "").trim();
      if (!s) return null;
      if (s === "24/7") return { always: true };
      if (/קיץ|חורף/.test(s)) { // Hebrew seasonal, open every day
        let summer = null, winter = null;
        s.split(/[·;]/).forEach(part => {
          const m = /(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/.exec(part);
          if (!m) return;
          const r = [parseTime(m[1]), parseTime(m[2])];
          if (/קיץ/.test(part)) summer = r; else if (/חורף/.test(part)) winter = r;
        });
        if (!summer && !winter) return null;
        return { seasonalHe: { summer, winter } };
      }
      // per-day ranges: null = untouched, [] = closed, [[s,e]] = open, "unknown" = day listed w/o time
      const plain = Array(7).fill(null), summer = Array(7).fill(null), winter = Array(7).fill(null);
      let any = false, sawTime = false;
      s.split(";").forEach(rule => {
        rule = rule.trim();
        if (!rule) return;
        let target = plain, m;
        if ((m = /^summer\s+/i.exec(rule))) { target = summer; rule = rule.slice(m[0].length); }
        else if ((m = /^winter\s+/i.exec(rule))) { target = winter; rule = rule.slice(m[0].length); }
        const tm = /(\d{1,2}:\d{2}.*|off|closed)\s*$/i.exec(rule);
        const dayPart = (tm ? rule.slice(0, tm.index) : rule).trim().replace(/,\s*$/, "");
        const timePart = tm ? tm[1] : null;
        let days;
        if (!dayPart) days = [0, 1, 2, 3, 4, 5, 6];
        else { days = parseDays(dayPart); if (!days.length) return; } // e.g. "PH off" -> no-op
        const ranges = timePart != null ? parseRanges(timePart) : "unknown";
        if (ranges !== "unknown") sawTime = true;
        any = true;
        days.forEach(d => { target[d] = ranges; });

      if (!any) return null;
      return { rules: { plain, summer, winter }, sawTime };

    const _schedCache = new Map();
    function schedFor(a) {
      if (a._sched !== undefined) return a._sched;
      if (!a.hours) return (a._sched = null);
      if (!_schedCache.has(a.hours)) { try { _schedCache.set(a.hours, parseHours(a.hours)); } catch (e) { _schedCache.set(a.hours, null); } }
      return (a._sched = _schedCache.get(a.hours));

    function dayRanges(sched, dayIdx, now) { // -> [[s,e],...] | [] (closed) | "unknown"
      if (!sched) return "unknown";
      if (sched.always) return [[0, 1440]];
      if (sched.seasonalHe) {
        const r = isSummer(now) ? (sched.seasonalHe.summer || sched.seasonalHe.winter)
                                : (sched.seasonalHe.winter || sched.seasonalHe.summer);
        return r ? [r] : "unknown";
      }
      const seas = isSummer(now) ? sched.rules.summer : sched.rules.winter;
      const r = seas[dayIdx] != null ? seas[dayIdx] : sched.rules.plain[dayIdx];
      if (r == null) return sched.sawTime ? [] : "unknown"; // unlisted day -> closed when other days are timed
      return r;
    }
    function nowStatus(sched, now) {
      const r = dayRanges(sched, now.getDay(), now);
      if (r === "unknown") return { status: "unknown" };
      const mins = now.getHours() * 60 + now.getMinutes();
      for (const [a, b] of r) { const end = b <= a ? b + 1440 : b; if (mins >= a && mins < end) return { status: "open", until: b }; }
      return { status: "closed" };
    }
    function satStatus(sched, now) {
      const r = dayRanges(sched, 6, now);
      if (r === "unknown") return { status: "unknown" };
      if (!r.length) return { status: "closed" };
      return { status: "open", ranges: r };
    }

    // ===================================================================

    // ===================================================================
    (function () {
      // Pilot scope: Netanya / Sharon (densest data). Deterministic, no backend.
      const ANCHOR = { name: "נתניה / השרון", lat: 32.3215, lng: 34.8532 };
      const RADIUS_KM = 12;
      const TRIP_QUERY = "תכנן לי חצי יום בנתניה עם עגלת קפה ופעילות מקורה";
      const CAT = {
        coffee:     { emoji: "☕", kind: "עגלת קפה",       dur: 30 },
        indoor:     { emoji: "🏛️", kind: "פעילות מקורה",   dur: 90 },
        beach:      { emoji: "🌊", kind: "חוף וים",         dur: 60 },
        nature:     { emoji: "🌳", kind: "טבע ונוף",        dur: 60 },
        kids:       { emoji: "🎠", kind: "פעילות לילדים",   dur: 75 },
        attraction: { emoji: "🎟️", kind: "אטרקציה",         dur: 60 },

      function hav(a, b) {
        const R = 6371, r = d => d * Math.PI / 180;

        const s = Math.sin(dLat / 2) ** 2 + Math.cos(r(a.lat)) * Math.cos(r(b.lat)) * Math.sin(dLng / 2) ** 2;
        return 2 * R * Math.asin(Math.sqrt(s));
      }
      const round1 = x => Math.round(x * 10) / 10;
      function fmt(m) {
        m = Math.round(m);
        const h = Math.floor(m / 60) % 24, mm = m % 60;

      }

      // coords). Collapse to ~110 m buckets, keeping the richest record.
      function dedupe(arr) {
        const by = {};
        for (const a of arr) {
          const k = a.lat.toFixed(3) + "," + a.lng.toFixed(3);
          if (!by[k] || richness(a) > richness(by[k])) by[k] = a;
        }
        return Object.values(by);
      }
      const isFree = a => (a.types || []).includes("טיולים בחינם") || a.fee === "no";

      // Coarse category inference from the existing types[]/keywords — no enrichment.
      function classify(a) {
        const types = a.types || [];
        const hay = (a.title || "") + " " + (a.keywords || []).join(" ") + " " + types.join(" ");
        const cats = [];
        if (types.includes("עגלות קפה ופוד טראק")) cats.push("coffee");
        if (/מוזיאון|מרכז מדע|מדע|משחקייה|אסקייפ|גלריה|מרכז מבקרים|פלנת|חלל המופלא|אורבניה/.test(hay)) cats.push("indoor");
        if (types.includes("טיולי מים") || /חוף|טיילת/.test(hay)) cats.push("beach");
        if (types.some(x => ["טיולי פריחה", "נקודות עניין בטבע", "שמורות טבע וגנים לאומיים", "נקודות תצפית", "פארקים לפיקניק", "מסלולי טיול"].includes(x))) cats.push("nature");
        if (types.some(x => ["פארק שעשועים", "טיולים עם עגלות", "טיולים עם חיות"].includes(x)) || /טרמפולינ|ג'ימבו|פארק שעשוע/.test(hay)) cats.push("kids");

          nature: "קצת ירוק ושקט בטבע.",
          kids: "פעילות שהילדים יאהבו.",
          attraction: "אטרקציה מקומית מומלצת באזור.",
        })[cat] || "עצירה מומלצת באזור.";
      }
      function buildIntro(n, mh, missLabels) {
        const wants = [];
        if (mh.has("coffee")) wants.push("עגלת קפה");
        if (mh.has("indoor")) wants.push("פעילות מקורה");
        if (mh.has("kids")) wants.push("פעילות לילדים");

            title: c.place.title, lat: c.place.lat, lng: c.place.lng,
            why: whyFor(c.cat, i), leg: c.leg || null,

      const backdrop = document.getElementById("tripBackdrop");
      const sheet = document.getElementById("tripSheet");

      function gmapsUrl() {

      function matchStop(s) {
        let best = null, bd = 1e9;
        for (const a of data) {
          const d = Math.abs(a.lat - s.lat) + Math.abs(a.lng - s.lng);
          if (d < bd) { bd = d; best = a; }
        }
        return bd < 0.002 ? best : null;
      }

      function clearRoute() {
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        if (!map.hasLayer(cluster)) map.addLayer(cluster);
      }

      function closeTrip() {
        clearRoute();
        panel.classList.remove("show");
      }

      function revealMarker(s) {
        const el = s._m && s._m.getElement();
        const n = el && el.querySelector(".route-num");
        if (n) n.classList.remove("is-pre");
      }

      function drawRoute() {
        clearRoute();
        routeLayer = L.layerGroup().addTo(map);
        const latlngs = TRIP.stops.map(s => L.latLng(s.lat, s.lng));

        // Numbered pins — added now (so clicks work) but hidden until the line reaches them.
        TRIP.stops.forEach((s, i) => {
          const a = matchStop(s);
          const icon = L.divIcon({
            className: "",
            html: `<div class="route-num is-pre"><span>${i + 1}</span></div>`,
            iconSize: [30, 30], iconAnchor: [15, 28], popupAnchor: [0, -28],
          });
          const m = L.marker([s.lat, s.lng], { icon, zIndexOffset: 2000 }).addTo(routeLayer);
          if (a) m.bindPopup(() => popupHtml(a), { minWidth: 240, maxWidth: 240 });
          s._m = m;
          s._shown = false;
        });

        map.removeLayer(cluster); // declutter so the route reads clearly
        const mobile = window.matchMedia("(max-width: 720px)").matches;
        map.fitBounds(L.latLngBounds(latlngs), mobile
          ? { paddingTopLeft: [20, 20], paddingBottomRight: [20, Math.round(window.innerHeight * 0.5)] }
          : { paddingTopLeft: [370, 30], paddingBottomRight: [40, 40] });

        // Cumulative leg lengths so the line can be drawn at a constant speed.
        const cum = [0];
        for (let i = 1; i < latlngs.length; i++) cum[i] = cum[i - 1] + latlngs[i - 1].distanceTo(latlngs[i]);
        const total = cum[cum.length - 1] || 1;

        const casing = L.polyline([latlngs[0]], { color: "#fff", weight: 7, opacity: .9 }).addTo(routeLayer);
        const line = L.polyline([latlngs[0]], { color: "#7c3aed", weight: 4, opacity: .95, dashArray: "1 9", lineCap: "round" }).addTo(routeLayer);

        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduced) {
          casing.setLatLngs(latlngs); line.setLatLngs(latlngs);
          TRIP.stops.forEach(s => { s._shown = true; revealMarker(s); });
          return;
        }

        const DUR = 2800, t0 = performance.now();
        function frame(now) {
          if (!routeLayer) return; // bailed out (closed/redone mid-animation)
          const p = Math.min(1, (now - t0) / DUR);
          const drawn = (1 - Math.pow(1 - p, 3)) * total; // easeOutCubic
          const part = [latlngs[0]];
          for (let i = 1; i < latlngs.length; i++) {
            if (drawn >= cum[i]) { part.push(latlngs[i]); continue; }
            const f = (drawn - cum[i - 1]) / (cum[i] - cum[i - 1]);
            if (f > 0) part.push(L.latLng(
              latlngs[i - 1].lat + (latlngs[i].lat - latlngs[i - 1].lat) * f,
              latlngs[i - 1].lng + (latlngs[i].lng - latlngs[i - 1].lng) * f));
            break;
          }
          casing.setLatLngs(part); line.setLatLngs(part);
          TRIP.stops.forEach((s, i) => { if (!s._shown && drawn >= cum[i] - 1) { s._shown = true; revealMarker(s); } });
          if (p < 1) requestAnimationFrame(frame);
          else TRIP.stops.forEach(s => { if (!s._shown) { s._shown = true; revealMarker(s); } });
        }
        requestAnimationFrame(frame);
      }

      function panelHTML() {
        const stops = TRIP.stops.map((st, i) => {
          const leg = st.leg
            ? `<div class="tleg"><span class="line"></span>${st.leg.mode === "walk" ? "🚶" : "🚗"} ${st.leg.min} דק׳ · ${st.leg.km} ק״מ</div>`
            : "";
          return `<div class="tstop" data-i="${i}">
              <div class="num">${i + 1}</div>
              <div class="body">
                <div class="row1"><span class="time">${esc(st.time)}</span><span class="kind">${st.emoji} ${esc(st.kind)}</span></div>
                <div class="name">${esc(st.title)}</div>
                <div class="why">${esc(st.why)}</div>
                <div class="dur">⏱️ ${esc(st.dur)}</div>
              </div></div>${leg}`;
        }).join("");
        return `
          <div class="trip-phead">
            <button class="close" id="tripClose" aria-label="סגור">✕</button>
            <p class="ttl">✨ ${esc(TRIP.title)}</p>
            <div class="meta">${esc(TRIP.subtitle)}</div>
          </div>
          <div class="trip-intro"><span class="ai">✨</span><span>${esc(TRIP.intro)}</span></div>
          <div class="trip-body">${stops}</div>
          <div class="trip-actions">
            <a class="nav" href="${gmapsUrl()}" target="_blank" rel="noopener">🧭 פתח את כל המסלול ב-Google Maps</a>
            <button class="nav redo" id="tripRedo">↻ תכנן מחדש</button>
          </div>`;
      }

      function showTrip() {
        drawRoute();
        panel.innerHTML = panelHTML();
        panel.classList.add("show");
        document.getElementById("tripClose").onclick = closeTrip;
        document.getElementById("tripRedo").onclick = () => { closeTrip(); openSheet(); };
        panel.querySelectorAll(".tstop").forEach(el => {
          el.onclick = () => {
            const st = TRIP.stops[Number(el.dataset.i)];
            map.flyTo([st.lat, st.lng], 15, { duration: .6 });
            if (st._m) st._m.openPopup();
          };
        });
      }

      function sheetHTML() {
        return `
          <h2>✨ סוכן תכנון הטיולים</h2>
          <p class="sub">תארו מה בא לכם — והסוכן יבנה מסלול מתוך המקומות שאספנו.<br><b>אזור הניסוי:</b> נתניה והשרון.</p>
          <textarea class="trip-input" id="tripQuery">${esc(TRIP_QUERY)}</textarea>
          <div class="trip-chips" id="tripChips">
            <button class="trip-chip on" data-cat="coffee">☕ עגלת קפה</button>
            <button class="trip-chip on" data-cat="indoor">🏛️ פעילות מקורה</button>
            <button class="trip-chip" data-cat="kids">👨‍👩‍👧 עם ילדים</button>
            <button class="trip-chip" data-cat="free">🆓 בלי תשלום</button>
          </div>
          <div class="trip-chips" id="tripDur">
            <button class="trip-chip dur on" data-dur="half">⏱️ חצי יום</button>
            <button class="trip-chip dur" data-dur="full">🌅 יום מלא</button>
          </div>
          <button class="trip-go" id="tripGo">בנה לי מסלול ✨</button>
          <button class="trip-cancel" id="tripCancel">ביטול</button>`;
      }

      function readOpts() {
        const mustHaves = new Set();
        sheet.querySelectorAll("#tripChips .trip-chip.on").forEach(c => mustHaves.add(c.dataset.cat));
        const durEl = sheet.querySelector("#tripDur .trip-chip.on");
        return { mustHaves, duration: durEl ? durEl.dataset.dur : "half" };
      }

      // Light keyword sniff over the free-text box → pre-toggles chips ("it understood me").
      function sniff(durBtns) {
        const v = document.getElementById("tripQuery").value;
        const re = { coffee: /קפה|עגל/, indoor: /מקור|מוזיאון|מדע|בפנים/, kids: /ילד|משפח/, free: /חינם|בלי תשלום/ };
        sheet.querySelectorAll("#tripChips .trip-chip").forEach(c => {
          const r = re[c.dataset.cat]; if (r) c.classList.toggle("on", r.test(v));
        });
        if (/יום מלא/.test(v)) durBtns.forEach(x => x.classList.toggle("on", x.dataset.dur === "full"));
        else if (/חצי יום/.test(v)) durBtns.forEach(x => x.classList.toggle("on", x.dataset.dur === "half"));
      }

      function runThinking() {
        TRIP = generatePlan(readOpts());
        if (!TRIP || TRIP.stops.length < 2) {
          sheet.innerHTML = `<h2>הופס…</h2>
            <p class="sub">לא הצלחתי לבנות מסלול עם הסינון הזה. נסו להוריד מסנן, או לבחור יום מלא.</p>
            <button class="trip-cancel" id="tripCancel">סגור</button>`;
          document.getElementById("tripCancel").onclick = () => backdrop.classList.remove("show");
          return;
        }
        const msgs = [
          `מסנן ${TRIP.candCount} מקומות ברדיוס ${RADIUS_KM} ק״מ מנתניה…`,
          "מתאים לבקשה שלך…",
          "בונה רצף עצירות לפי מרחקי נסיעה…",
          "מסדר לוח זמנים…",
        ];
        sheet.innerHTML = `<h2>✨ בונה את המסלול…</h2>
          <div class="trip-think"><div class="trip-spin"></div><div id="thinkTxt">${msgs[0]}</div></div>`;
        const txt = document.getElementById("thinkTxt");
        let i = 0;
        const iv = setInterval(() => { i++; if (i < msgs.length) txt.textContent = msgs[i]; }, 480);
        setTimeout(() => { clearInterval(iv); backdrop.classList.remove("show"); showTrip(); }, 2000);
      }

      function openSheet() {
        sheet.innerHTML = sheetHTML();
        backdrop.classList.add("show");
        document.getElementById("tripCancel").onclick = () => backdrop.classList.remove("show");
        document.getElementById("tripGo").onclick = runThinking;
        sheet.querySelectorAll("#tripChips .trip-chip").forEach(c =>
          c.onclick = () => c.classList.toggle("on"));
        const durBtns = [...sheet.querySelectorAll("#tripDur .trip-chip")];
        durBtns.forEach(b => b.onclick = () => durBtns.forEach(x => x.classList.toggle("on", x === b)));
        const q = document.getElementById("tripQuery");
        if (q) q.oninput = () => sniff(durBtns);
      }

      backdrop.onclick = e => { if (e.target === backdrop) backdrop.classList.remove("show"); };
      document.getElementById("fabPlan").onclick = openSheet;
    })();
  </script>
</body>
</html>
