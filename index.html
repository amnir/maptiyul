<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>MapTiyul · מפת אתרים ואטרקציות בישראל</title>
  <meta name="description" content="מפה אינטראקטיבית של אלפי אתרים, אטרקציות, פארקים ועגלות קפה בישראל — סינון לפי סוג, אזור ומקור." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Share preview (WhatsApp / Facebook / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="MapTiyul · מפת אתרים ואטרקציות בישראל" />
  <meta property="og:description" content="אלפי אתרים, אטרקציות, פארקים ועגלות קפה בישראל על מפה אחת. סינון לפי סוג, אזור ומקור." />
  <meta property="og:url" content="https://amnir.github.io/maptiyul/" />
  <meta property="og:image" content="https://amnir.github.io/maptiyul/og-image.png" />
  <meta property="og:locale" content="he_IL" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#1f7a8c" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <!-- PWA / add-to-home-screen -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MapTiyul" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@300..800&display=swap" />

  <style>
    :root {
      --bg: #0f1720;
      --panel: #ffffff;
      --ink: #1b2430;
      --muted: #5b6b7b;
      --line: #e6ebf0;
      --accent: #1f7a8c;
      --r-north: #2e9e5b;
      --r-center: #2f6fd0;
      --r-jlem: #8b5cf6;
      --r-south: #e08a1e;
      --shadow: 0 6px 24px rgba(15,23,32,.12);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Assistant", "Heebo", "Segoe UI", system-ui, Arial, sans-serif;
      color: var(--ink); background: #eef2f5;
    }
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    #sidebar {
      width: 340px; flex: 0 0 340px; height: 100%;
      background: var(--panel); box-shadow: var(--shadow);
      display: flex; flex-direction: column; z-index: 1000;
    }
    .side-head { padding: 18px 18px 12px; border-bottom: 1px solid var(--line); }
    .side-head h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -.02em; direction: ltr; text-align: right; }
    .side-head .tagline { margin-top: 2px; font-size: 14px; font-weight: 600; color: var(--ink); }
    .side-head .count { margin-top: 4px; font-size: 13px; color: var(--muted); }
    .side-body { padding: 14px 18px; overflow-y: auto; flex: 1; }

    .search {
      width: 100%; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 10px; font-size: 14px; font-family: inherit; outline: none;
    }
    .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,122,140,.12); }

    .group { margin-top: 18px; }
    .group h2 {
      font-size: 12px; text-transform: none; letter-spacing: .02em;
      color: var(--muted); margin: 0 0 8px; font-weight: 700;
    }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      border: 1px solid var(--line); background: #fff; color: var(--ink);
      border-radius: 999px; padding: 6px 12px; font-size: 13px; cursor: pointer;
      user-select: none; transition: .12s; display: inline-flex; align-items: center; gap: 6px;
    }
    .pill:hover { border-color: #c9d3db; }
    .pill .dot { width: 9px; height: 9px; border-radius: 50%; }
    .pill.active { color: #fff; border-color: transparent; }
    .pill.r-north.active { background: var(--r-north); }
    .pill.r-center.active { background: var(--r-center); }
    .pill.r-jlem.active { background: var(--r-jlem); }
    .pill.r-south.active { background: var(--r-south); }
    .pill.src.active { background: var(--accent); border-color: transparent; }

    .types { display: flex; flex-direction: column; gap: 2px; }
    .type-row {
      display: flex; align-items: center; gap: 9px; padding: 7px 6px;
      border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .type-row:hover { background: #f4f7f9; }
    .type-row input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .type-row .c { color: var(--muted); font-size: 12px; margin-inline-start: auto; }

    .row-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn {
      flex: 1; padding: 8px; border-radius: 9px; border: 1px solid var(--line);
      background: #fff; cursor: pointer; font-size: 13px; font-family: inherit;
    }
    .btn:hover { background: #f4f7f9; }
    .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }

    .quickbar { display: flex; gap: 8px; margin-top: 10px; }
    .qbtn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 9px; border: 1px solid var(--line); background: #fff; border-radius: 10px;
      font-size: 13px; font-family: inherit; cursor: pointer; transition: .12s;
      white-space: nowrap; min-width: 0; }
    .qbtn:hover { background: #f4f7f9; }
    .qbtn.active { background: var(--accent); color: #fff; border-color: transparent; }
    .radiuswrap { display: none; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; color: var(--muted); }
    .radiuswrap.show { display: flex; }
    .radiuswrap select { flex: 1; padding: 7px; border: 1px solid var(--line); border-radius: 9px;
      font-family: inherit; font-size: 13px; }
    .user-dot { width: 16px; height: 16px; border-radius: 50%; background: #2f6fd0;
      border: 3px solid #fff; box-shadow: 0 0 0 4px rgba(47,111,208,.3); }

    .listtoggle { width: 100%; margin-top: 8px; padding: 9px; border: 1px solid var(--line);
      background: #fff; border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
    .listtoggle:hover { background: #f4f7f9; }
    .listtoggle.active { background: var(--accent); color: #fff; border-color: transparent; }
    .results { display: none; margin-top: 8px; max-height: 320px; overflow-y: auto;
      border: 1px solid var(--line); border-radius: 10px; }
    .results.show { display: block; }
    .result-row { display: flex; align-items: center; gap: 8px; padding: 9px 11px;
      border-bottom: 1px solid var(--line); cursor: pointer; }
    .result-row:last-child { border-bottom: none; }
    .result-row:hover { background: #f4f7f9; }
    .result-row .rt { font-weight: 600; font-size: 13px; flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .result-row .rm { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .results .more { padding: 9px 11px; color: var(--muted); font-size: 12px; text-align: center; }
    .results .empty { padding: 14px; color: var(--muted); font-size: 13px; text-align: center; }

    /* Map */
    #map { flex: 1; height: 100%; }
    .leaflet-popup-content { margin: 0; width: 240px !important; }
    .pop-img { width: 100%; height: 130px; object-fit: cover; display: block;
      border-radius: 8px 8px 0 0; background: #dde4ea; }
    .pop-body { padding: 10px 12px 12px; }
    .pop-title { font-weight: 800; font-size: 15px; margin: 0 0 6px; line-height: 1.25; }
    .pop-addr { font-size: 12px; color: var(--muted); margin: 0 0 6px; }
    .pop-dist { font-size: 12px; font-weight: 700; color: var(--accent); margin: 0 0 6px; }
    .fav-btn { width: 100%; margin: 0 0 8px; padding: 7px; border: 1px solid var(--line);
      background: #fff; border-radius: 9px; font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; color: var(--ink); }
    .fav-btn:hover { background: #fff7e6; }
    .fav-btn.on { background: #fff2cc; border-color: #f0c14b; color: #8a6d1a; }
    .pop-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .pop-tag { font-size: 11px; background: #eef3f5; color: #34566a; padding: 2px 8px; border-radius: 999px; }
    .pop-links { display: flex; flex-wrap: wrap; gap: 4px 14px; }
    .pop-link { display: inline-block; font-size: 13px; font-weight: 700; color: var(--accent); text-decoration: none; }
    .pop-link:hover { text-decoration: underline; }
    .pop-nav { display: flex; gap: 8px; margin: 4px 0 10px; }
    .nav-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      font-size: 13px; font-weight: 700; text-decoration: none; padding: 8px 6px; border-radius: 9px; color: #fff; }
    .nav-btn.waze { background: #33ccff; }
    .nav-btn.gmaps { background: #1f7a8c; }
    .nav-btn:hover { filter: brightness(.95); }

    .marker-dot {
      width: 16px; height: 16px; border-radius: 50%; border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }

    /* Mobile */
    #toggle { display: none; }
    @media (max-width: 720px) {
      #sidebar {
        position: absolute; inset: 0 0 auto 0; width: 100%; flex: none;
        max-height: 70vh; transform: translateY(-100%); transition: transform .25s;
        border-radius: 0 0 16px 16px;
      }
      #sidebar.open { transform: translateY(0); }
      #toggle {
        display: flex; position: absolute; top: 12px; right: 12px; z-index: 1100;
        background: var(--accent); color: #fff; border: none; border-radius: 10px;
        padding: 10px 14px; font-size: 14px; font-family: inherit; box-shadow: var(--shadow); cursor: pointer;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <button id="toggle">סינון ☰</button>
    <aside id="sidebar">
      <div class="side-head">
        <h1>📍 MapTiyul</h1>
        <div class="tagline">אתרים ואטרקציות בישראל</div>
        <div class="count"><span id="count">—</span> מקומות על המפה</div>
      </div>
      <div class="side-body">
        <input id="search" class="search" type="search" placeholder="חיפוש לפי שם או מילת מפתח…" />

        <div class="quickbar">
          <button id="locate" class="qbtn">📍 קרוב אליי</button>
          <button id="favToggle" class="qbtn">☆ מועדפים (<span id="favCount">0</span>)</button>
          <button id="share" class="qbtn">🔗 שיתוף</button>
        </div>
        <div id="radiusWrap" class="radiuswrap">
          <span>מרחק:</span>
          <select id="radius">
            <option value="0">ללא הגבלה</option>
            <option value="10">עד 10 ק״מ</option>
            <option value="25">עד 25 ק״מ</option>
            <option value="50">עד 50 ק״מ</option>
            <option value="100">עד 100 ק״מ</option>
          </select>
        </div>

        <button id="listToggle" class="listtoggle">📋 הצג רשימת תוצאות</button>
        <div id="resultsList" class="results"></div>

        <div class="group">
          <h2>אזור</h2>
          <div class="pills" id="regions"></div>
        </div>

        <div class="group" id="sourceGroup">
          <h2>מקור</h2>
          <div class="pills" id="sources"></div>
        </div>

        <div class="group">
          <h2>סוג אטרקציה</h2>
          <div class="row-actions">
            <button class="btn" id="allTypes">הכל</button>
            <button class="btn" id="noTypes">נקה</button>
          </div>
          <div class="types" id="types" style="margin-top:8px"></div>
        </div>
      </div>
    </aside>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="data/attractions.js"></script>
  <script>
    const REGION_META = {
      "צפון":   { cls: "r-north",  color: "#2e9e5b" },
      "מרכז":   { cls: "r-center", color: "#2f6fd0" },
      "ירושלים":{ cls: "r-jlem",   color: "#8b5cf6" },
      "דרום":   { cls: "r-south",  color: "#e08a1e" },
    };
    const DEFAULT_REGION = { cls: "r-center", color: "#64748b" };

    const data = (window.ATTRACTIONS || []).filter(a => a.lat && a.lng);
    data.forEach((a, i) => {
      a._i = i;
      a.id = (a.sources && a.sources[0] && a.sources[0].url) || `${a.title}|${a.lat}|${a.lng}`;
    });

    // ---- Favorites (persisted in the browser) ----
    const FAV_KEY = "maptiyul_favs";
    let favorites = new Set();
    try { favorites = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || "[]")); } catch (e) {}
    function saveFavs() { try { localStorage.setItem(FAV_KEY, JSON.stringify([...favorites])); } catch (e) {} }
    function updateFavCount() { document.getElementById("favCount").textContent = favorites.size; }
    function toggleFav(i, btn) {
      const a = data[i];
      if (!a) return;
      if (favorites.has(a.id)) favorites.delete(a.id); else favorites.add(a.id);
      saveFavs();
      updateFavCount();
      if (btn) {
        const on = favorites.has(a.id);
        btn.classList.toggle("on", on);
        btn.textContent = on ? "★ שמור במועדפים" : "☆ הוסף למועדפים";
      }
      if (state.favOnly) render();
    }

    const map = L.map("map", { zoomControl: true }).setView([31.4, 35.0], 8);
    const baseLayers = {
      "מפה": L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19, attribution: "&copy; OpenStreetMap"
      }),
      "לוויין": L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
        maxZoom: 19, attribution: "&copy; Esri, Maxar, Earthstar Geographics"
      }),
      "טופוגרפי": L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
        maxZoom: 17, attribution: "&copy; OpenTopoMap (CC-BY-SA), &copy; OpenStreetMap"
      }),
    };
    baseLayers["מפה"].addTo(map);
    L.control.layers(baseLayers, null, { position: "topleft" }).addTo(map);

    const cluster = L.markerClusterGroup({ maxClusterRadius: 50, spiderfyOnMaxZoom: true });
    map.addLayer(cluster);

    // ---- Build filter state ----
    const typeCounts = {};
    data.forEach(a => (a.types || []).forEach(t => typeCounts[t] = (typeCounts[t] || 0) + 1));
    const allTypes = Object.keys(typeCounts).sort((a, b) => typeCounts[b] - typeCounts[a]);
    const regionsPresent = [...new Set(data.map(a => a.region))].filter(Boolean);
    const REGION_ORDER = ["צפון", "מרכז", "ירושלים", "דרום"];
    const regions = REGION_ORDER.filter(r => regionsPresent.includes(r))
      .concat(regionsPresent.filter(r => !REGION_ORDER.includes(r)));

    const sourceLabels = {};
    const sourceCounts = {};
    data.forEach(a => (a.sources || []).forEach(s => {
      sourceLabels[s.name] = s.label || s.name;
      sourceCounts[s.name] = (sourceCounts[s.name] || 0) + 1;
    }));
    const sources = Object.keys(sourceLabels).sort((a, b) => sourceCounts[b] - sourceCounts[a]);

    const state = {
      regions: new Set(regions),
      types: new Set(allTypes),
      sources: new Set(sources),
      q: "",
      radiusKm: 0,
      favOnly: false,
      listOpen: false,
    };

    // ---- Location / distance ----
    let userLatLng = null;
    let userMarker = null;
    function distanceKm(a) {
      if (!userLatLng) return null;
      const R = 6371, toRad = d => d * Math.PI / 180;
      const dLat = toRad(a.lat - userLatLng.lat), dLng = toRad(a.lng - userLatLng.lng);
      const s = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(userLatLng.lat)) * Math.cos(toRad(a.lat)) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(s));
    }
    function setUserLocation(lat, lng) {
      userLatLng = { lat, lng };
      if (userMarker) userMarker.setLatLng([lat, lng]);
      else userMarker = L.marker([lat, lng], {
        icon: L.divIcon({ className: "", html: '<div class="user-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
        zIndexOffset: 1000, interactive: false,
      }).addTo(map);
      document.getElementById("radiusWrap").classList.add("show");
      document.getElementById("locate").classList.add("active");
      map.setView([lat, lng], 11);
      render();
    }

    // ---- Render filters ----
    const regionPills = {};
    const regionsEl = document.getElementById("regions");
    regions.forEach(r => {
      const meta = REGION_META[r] || DEFAULT_REGION;
      const el = document.createElement("button");
      el.className = `pill ${meta.cls} active`;
      el.innerHTML = `<span class="dot" style="background:${meta.color}"></span>${r}`;
      el.onclick = () => {
        if (state.regions.has(r)) { state.regions.delete(r); el.classList.remove("active"); }
        else { state.regions.add(r); el.classList.add("active"); }
        render();
      };
      regionPills[r] = el;
      regionsEl.appendChild(el);
    });

    const sourcePills = {};
    const sourcesEl = document.getElementById("sources");
    sources.forEach(name => {
      const el = document.createElement("button");
      el.className = "pill src active";
      el.textContent = `${sourceLabels[name]} (${sourceCounts[name]})`;
      el.onclick = () => {
        if (state.sources.has(name)) { state.sources.delete(name); el.classList.remove("active"); }
        else { state.sources.add(name); el.classList.add("active"); }
        render();
      };
      sourcePills[name] = el;
      sourcesEl.appendChild(el);
    });
    if (sources.length < 2) document.getElementById("sourceGroup").style.display = "none";

    const typesEl = document.getElementById("types");
    const typeInputs = {};
    allTypes.forEach(t => {
      const row = document.createElement("label");
      row.className = "type-row";
      row.innerHTML = `<input type="checkbox" checked /><span>${t}</span><span class="c">${typeCounts[t]}</span>`;
      const cb = row.querySelector("input");
      typeInputs[t] = cb;
      cb.onchange = () => {
        if (cb.checked) state.types.add(t); else state.types.delete(t);
        render();
      };
      typesEl.appendChild(row);
    });

    document.getElementById("search").addEventListener("input", e => {
      state.q = e.target.value.trim().toLowerCase();
      render();
    });
    document.getElementById("allTypes").onclick = () => {
      state.types = new Set(allTypes);
      Object.values(typeInputs).forEach(cb => cb.checked = true);
      render();
    };
    document.getElementById("noTypes").onclick = () => {
      state.types = new Set();
      Object.values(typeInputs).forEach(cb => cb.checked = false);
      render();
    };
    document.getElementById("toggle").onclick = () =>
      document.getElementById("sidebar").classList.toggle("open");

    document.getElementById("locate").onclick = () => {
      if (!navigator.geolocation) { alert("הדפדפן לא תומך באיתור מיקום"); return; }
      if (!window.isSecureContext) {
        alert("איתור מיקום עובד רק בחיבור מאובטח (https). נסו לפתוח את האתר בכתובת https.");
        return;
      }
      const btn = document.getElementById("locate");
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = "מאתר…";
      const deniedMsg = "הגישה למיקום נחסמה. באייפון: הגדרות > פרטיות > שירותי מיקום > Safari, ולאפשר מיקום לאתר דרך תפריט aA בשורת הכתובת.";
      const done = () => { btn.disabled = false; btn.textContent = "📍 קרוב אליי"; };
      const onSuccess = pos => { done(); setUserLocation(pos.coords.latitude, pos.coords.longitude); };
      const onError = err => {
        if (err.code === err.PERMISSION_DENIED) { done(); alert(deniedMsg); return; }
        // High accuracy (GPS) often times out indoors — retry once with low accuracy
        navigator.geolocation.getCurrentPosition(onSuccess, err2 => {
          done();
          alert(err2.code === err2.PERMISSION_DENIED ? deniedMsg
            : "לא הצלחנו לאתר את המיקום שלך. ודאו ששירותי המיקום פעילים ונסו שוב.");
        }, { enableHighAccuracy: false, timeout: 15000, maximumAge: 60000 });
      };
      navigator.geolocation.getCurrentPosition(onSuccess, onError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
    };
    document.getElementById("radius").onchange = e => {
      state.radiusKm = Number(e.target.value);
      render();
    };
    document.getElementById("favToggle").onclick = () => {
      state.favOnly = !state.favOnly;
      document.getElementById("favToggle").classList.toggle("active", state.favOnly);
      render();
    };
    document.getElementById("listToggle").onclick = () => {
      state.listOpen = !state.listOpen;
      const btn = document.getElementById("listToggle");
      btn.classList.toggle("active", state.listOpen);
      btn.textContent = state.listOpen ? "📋 הסתר רשימה" : "📋 הצג רשימת תוצאות";
      document.getElementById("resultsList").classList.toggle("show", state.listOpen);
      renderList();
    };

    function flyToPlace(a) {
      const m = markers[a._i];
      cluster.zoomToShowLayer(m, () => m.openPopup());
      if (window.matchMedia("(max-width: 720px)").matches)
        document.getElementById("sidebar").classList.remove("open");
    }
    function renderList() {
      const box = document.getElementById("resultsList");
      if (!state.listOpen) { box.innerHTML = ""; return; }
      let shown = markers.filter(m => matches(m._data)).map(m => m._data);
      shown.sort(userLatLng
        ? (a, b) => distanceKm(a) - distanceKm(b)
        : (a, b) => a.title.localeCompare(b.title, "he"));
      if (!shown.length) { box.innerHTML = '<div class="empty">אין תוצאות לסינון הנוכחי</div>'; return; }
      const CAP = 300;
      const rows = shown.slice(0, CAP).map(a => {
        const d = distanceKm(a);
        const meta = d != null
          ? (d < 1 ? Math.round(d * 1000) + " מ׳" : d.toFixed(1) + " ק״מ")
          : (a.types && a.types[0] ? a.types[0] : a.region || "");
        return `<div class="result-row" data-i="${a._i}">
          <span class="rt">${esc(a.title)}</span><span class="rm">${esc(meta)}</span></div>`;
      }).join("");
      const more = shown.length > CAP ? `<div class="more">ועוד ${shown.length - CAP} תוצאות…</div>` : "";
      box.innerHTML = rows + more;
      box.querySelectorAll(".result-row").forEach(el =>
        el.onclick = () => flyToPlace(data[Number(el.dataset.i)]));
    }

    // ---- Markers ----
    function markerIcon(region) {
      const color = (REGION_META[region] || DEFAULT_REGION).color;
      return L.divIcon({
        className: "",
        html: `<div class="marker-dot" style="background:${color}"></div>`,
        iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -8],
      });
    }
    function esc(s) { return (s || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
    function popupHtml(a) {
      const tags = (a.types || []).slice(0, 4).map(t => `<span class="pop-tag">${esc(t)}</span>`).join("");
      const img = a.image ? `<img class="pop-img" src="${esc(a.image)}" loading="lazy" onerror="this.style.display='none'">` : "";
      const dkm = distanceKm(a);
      const dist = dkm != null ? `<p class="pop-dist">📍 ${dkm < 1 ? Math.round(dkm * 1000) + " מ׳" : dkm.toFixed(1) + " ק״מ"} ממך</p>` : "";
      const addr = a.address ? `<p class="pop-addr">📍 ${esc(a.address)}</p>` : "";
      const links = (a.sources || []).map(s =>
        `<a class="pop-link" href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.label || s.name)} ←</a>`
      ).join("");
      const waze = `https://waze.com/ul?ll=${a.lat},${a.lng}&navigate=yes`;
      const gmaps = `https://www.google.com/maps/dir/?api=1&destination=${a.lat},${a.lng}`;
      const nav = `<div class="pop-nav">
        <a class="nav-btn waze" href="${waze}" target="_blank" rel="noopener">Waze</a>
        <a class="nav-btn gmaps" href="${gmaps}" target="_blank" rel="noopener">Google Maps</a>
      </div>`;
      const on = favorites.has(a.id);
      const fav = `<button class="fav-btn ${on ? "on" : ""}" onclick="toggleFav(${a._i}, this)">${on ? "★ שמור במועדפים" : "☆ הוסף למועדפים"}</button>`;
      return `${img}<div class="pop-body">
        <p class="pop-title">${esc(a.title)}</p>
        ${dist}
        ${addr}
        <div class="pop-tags">${tags}</div>
        ${nav}
        ${fav}
        <div class="pop-links">${links}</div>
      </div>`;
    }

    const markers = data.map(a => {
      const m = L.marker([a.lat, a.lng], { icon: markerIcon(a.region) });
      m.bindPopup(() => popupHtml(a), { minWidth: 240, maxWidth: 240 });
      m._data = a;
      return m;
    });

    function matches(a) {
      if (!state.regions.has(a.region)) return false;
      if (!(a.sources || []).some(s => state.sources.has(s.name))) return false;
      if (userLatLng && state.radiusKm > 0 && distanceKm(a) > state.radiusKm) return false;
      if (state.favOnly && !favorites.has(a.id)) return false;
      const ts = a.types || [];
      if (ts.length === 0) { if (state.types.size === 0) return false; }
      else if (!ts.some(t => state.types.has(t))) return false;
      if (state.q) {
        const hay = (a.title + " " + (a.address || "") + " " + (a.keywords || []).join(" ") + " " + ts.join(" ")).toLowerCase();
        if (!hay.includes(state.q)) return false;
      }
      return true;
    }

    function render() {
      cluster.clearLayers();
      const shown = markers.filter(m => matches(m._data));
      cluster.addLayers(shown);
      document.getElementById("count").textContent = shown.length.toLocaleString("he-IL");
      renderList();
      updateHash();
    }

    // ---- Shareable state in the URL hash ----
    // Facets default to "all selected"; we store the OFF indices, which is short.
    let hashReady = false;
    function offIndices(allArr, set) {
      return allArr.map((v, i) => set.has(v) ? -1 : i).filter(i => i >= 0).join(".");
    }
    function updateHash() {
      if (!hashReady) return;
      const p = new URLSearchParams();
      if (state.q) p.set("q", state.q);
      const ro = offIndices(regions, state.regions); if (ro) p.set("ro", ro);
      const so = offIndices(sources, state.sources); if (so) p.set("so", so);
      const to = offIndices(allTypes, state.types); if (to) p.set("to", to);
      if (state.favOnly) p.set("fav", "1");
      if (state.radiusKm) p.set("rad", state.radiusKm);
      const c = map.getCenter();
      p.set("v", `${map.getZoom()}/${c.lat.toFixed(5)}/${c.lng.toFixed(5)}`);
      history.replaceState(null, "", "#" + p.toString());
    }
    function applyOff(str, allArr, set, onOff) {
      if (str == null) return;
      const off = new Set(str.split(".").filter(s => s !== "").map(Number));
      allArr.forEach((v, i) => { if (off.has(i)) { set.delete(v); onOff(v); } });
    }
    function applyHash() {
      const h = location.hash.replace(/^#/, "");
      if (!h) return false;
      const p = new URLSearchParams(h);
      if (p.has("q")) {
        state.q = p.get("q").toLowerCase();
        document.getElementById("search").value = p.get("q");
      }
      applyOff(p.get("ro"), regions, state.regions, r => regionPills[r] && regionPills[r].classList.remove("active"));
      applyOff(p.get("so"), sources, state.sources, n => sourcePills[n] && sourcePills[n].classList.remove("active"));
      applyOff(p.get("to"), allTypes, state.types, t => { if (typeInputs[t]) typeInputs[t].checked = false; });
      if (p.get("fav") === "1") {
        state.favOnly = true;
        document.getElementById("favToggle").classList.add("active");
      }
      if (p.has("rad")) {
        state.radiusKm = Number(p.get("rad"));
        document.getElementById("radius").value = p.get("rad");
      }
      const v = p.get("v");
      if (v) {
        const [z, lat, lng] = v.split("/").map(Number);
        if (!isNaN(z) && !isNaN(lat) && !isNaN(lng)) { map.setView([lat, lng], z); return true; }
      }
      return false;
    }

    document.getElementById("share").onclick = async () => {
      const btn = document.getElementById("share");
      try { await navigator.clipboard.writeText(location.href); btn.textContent = "✓ הקישור הועתק"; }
      catch (e) { btn.textContent = "העתק מהכתובת ↑"; }
      setTimeout(() => { btn.textContent = "🔗 שיתוף"; }, 1800);
    };

    updateFavCount();
    const hadView = applyHash();
    hashReady = true;
    render();
    map.on("moveend", updateHash);
    if (markers.length && !hadView) {
      try { map.fitBounds(L.latLngBounds(data.map(a => [a.lat, a.lng])).pad(0.05)); } catch (e) {}
    }

    if ("serviceWorker" in navigator && location.protocol === "https:") {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
